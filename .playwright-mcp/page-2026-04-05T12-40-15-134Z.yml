        - generic [ref=e8]: 費用・月謝について（共通）
        - img [ref=e9]
      - list [ref=e11]:
        - listitem [ref=e12]: 入会金：¥11,000（税込）― 入会時に一律
        - listitem [ref=e13]: 年会金：¥13,200（税込）― 途中入会は1ヶ月¥1,100×残月数。毎年3月末に翌年分請求。複数クラブ入会でも1種目分のみ。
        - listitem [ref=e14]: 在園児・卒園児：入会金免除。在園児年会金¥2,200。
        - listitem [ref=e15]: 運営費・大会準備費・用具費・ユニフォーム費はクラブ・スクールにより異なる。
        - listitem [ref=e16]: 合宿・大会出場等の費用はその都度連絡。
        - listitem [ref=e17]: 月謝：Aコース（バス利用あり）／ Bコース（バス利用なし）
    - generic [ref=e18]:
