          - text: ：合宿・大会参加・チーム登録あり。送迎バス利用可
        - listitem [ref=e26]:
          - strong [ref=e27]: スクール
          - text: ：個人スキルアップのみ。合宿・大会なし。送迎バス利用不可
        - listitem [ref=e28]:
          - strong [ref=e29]: 年齢区分
          - text: ：セミジュニア(年少々3歳) → ジュニア(年少4歳) → ミドル(年中5歳) → シニア(年長6歳) → 小学生
        - listitem [ref=e30]:
          - strong [ref=e31]: 送迎バス（シャトルバス）
          - text: ：小学生以上対象。停留所は①お台場海浜公園駅・②豊洲駅。幼児は対象外。
